<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bunny Workout" />
  <meta name="theme-color" content="#ec4899" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff6eb4'/%3E%3Cstop offset='1' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Cellipse cx='50' cy='68' rx='28' ry='26' fill='white' opacity='.92'/%3E%3Crect x='27' y='10' width='13' height='32' rx='6' fill='white' opacity='.92'/%3E%3Crect x='60' y='10' width='13' height='32' rx='6' fill='white' opacity='.92'/%3E%3Crect x='30' y='13' width='7' height='22' rx='3' fill='%23ffb6d9'/%3E%3Crect x='63' y='13' width='7' height='22' rx='3' fill='%23ffb6d9'/%3E%3Ccircle cx='40' cy='65' r='5' fill='%23ec4899'/%3E%3Ccircle cx='60' cy='65' r='5' fill='%23ec4899'/%3E%3Ccircle cx='41' cy='63' r='2' fill='white'/%3E%3Ccircle cx='61' cy='63' r='2' fill='white'/%3E%3Cellipse cx='50' cy='75' rx='5' ry='3' fill='%23ffb6d9'/%3E%3C/svg%3E" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Bunny Workout</title>
  <script type="module" src="/src/main.js"></script>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <span class="app-title">🐰 workout</span>
      <div class="header-actions">
        <button class="icon-btn" id="exportBtn" title="exporteer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <label class="icon-btn" title="importeer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 16 12 21 7 16"/><line x1="12" y1="21" x2="12" y2="3"/></svg>
          <input type="file" id="importInput" accept=".json" style="display:none" />
        </label>
        <div class="streak-badge">
          <span class="streak-count" id="streakCount">0</span>
          <span class="streak-label">🥕 hops</span>
        </div>
      </div>
    </header>
    <nav class="tab-bar" id="tabBar">
      <div class="tab-indicator" id="tabIndicator"></div>
    </nav>
    <main class="main-content" id="mainContent"></main>
  </div>
  <div id="restTimer" class="rest-timer" style="display:none"></div>
  <div id="toastContainer" class="toast-container"></div>
  <div id="sheetOverlay" class="sheet-overlay"></div>
  <div id="bottomSheet" class="bottom-sheet"></div>
  <div id="modalOverlay" class="modal-overlay"></div>
  <div id="confirmModal" class="confirm-modal"></div>
</body>
</html>
